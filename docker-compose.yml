version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: great-loop-postgres
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_USER: ${DB_USER:-landmarks_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-landmarks_password}
      POSTGRES_DB: ${DB_NAME:-landmarks_db}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-landmarks_user} -d ${DB_NAME:-landmarks_db}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - great-loop-network

networks:
  great-loop-network:
    driver: bridge

volumes:
  postgres_data:
